events {}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  resolver 127.0.0.11 valid=30s ipv6=off;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
      set $api_upstream http://api:8000;
      proxy_pass $api_upstream$request_uri;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_connect_timeout 15s;
      proxy_send_timeout 180s;
      proxy_read_timeout 180s;
    }

    location /airflow/ {
      set $airflow_upstream http://airflow-webserver:8080;
      proxy_pass $airflow_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Forwarded-Port ${DATAIF_PUBLIC_PORT};
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_connect_timeout 15s;
      proxy_send_timeout 180s;
      proxy_read_timeout 180s;
    }

    location /metabase/embed/ {
      set $metabase_embed_upstream http://metabase:3000;
      rewrite ^/metabase/embed/(.*)$ /embed/$1 break;
      proxy_pass $metabase_embed_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_hide_header Content-Security-Policy;
      proxy_hide_header X-Frame-Options;
      proxy_connect_timeout 15s;
      proxy_send_timeout 180s;
      proxy_read_timeout 180s;
    }

    location /metabase/ {
      set $metabase_upstream http://metabase:3000;
      rewrite ^/metabase/(.*)$ /$1 break;
      proxy_pass $metabase_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_connect_timeout 15s;
      proxy_send_timeout 180s;
      proxy_read_timeout 180s;
    }

    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
