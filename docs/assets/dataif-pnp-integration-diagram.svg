<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">Diagrama de integração entre serviços da plataforma dataif e a Plataforma Nilo Peçanha</title>
  <desc id="desc">Comunicação entre interface administrativa, Keycloak, API, Airflow, catálogo público Power BI da PNP, PostgreSQL, Metabase e Vanna.</desc>
  <defs>
    <style>
      .bg { fill: #f8f9fa; }
      .title { font: 700 28px 'IBM Plex Sans', 'Segoe UI', sans-serif; fill: #212529; }
      .subtitle { font: 400 15px 'IBM Plex Sans', 'Segoe UI', sans-serif; fill: #6c757d; }
      .box { fill: #ffffff; stroke: #343a40; stroke-width: 2; rx: 18; ry: 18; }
      .box-app { fill: #e7f5ea; stroke: #195128; }
      .box-core { fill: #eef4ef; stroke: #28a745; }
      .box-data { fill: #fff8e1; stroke: #ffc107; }
      .box-ext { fill: #fdebec; stroke: #dc3545; }
      .label { font: 700 18px 'IBM Plex Sans', 'Segoe UI', sans-serif; fill: #212529; }
      .small { font: 400 13px 'IBM Plex Sans', 'Segoe UI', sans-serif; fill: #343a40; }
      .arrow { stroke: #343a40; stroke-width: 2.5; fill: none; marker-end: url(#arrowhead); }
      .arrow-data { stroke: #195128; stroke-width: 3; fill: none; marker-end: url(#arrowhead-green); }
      .note { font: 600 12px 'IBM Plex Sans', 'Segoe UI', sans-serif; fill: #343a40; }
      .note-data { font: 600 12px 'IBM Plex Sans', 'Segoe UI', sans-serif; fill: #195128; }
      .legend-title { font: 700 16px 'IBM Plex Sans', 'Segoe UI', sans-serif; fill: #212529; }
      .legend-text { font: 400 13px 'IBM Plex Sans', 'Segoe UI', sans-serif; fill: #343a40; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#343a40" />
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#195128" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="820" />
  <text class="title" x="60" y="60">Figura 1 - Integração atual entre a dataif e a Plataforma Nilo Peçanha</text>
  <text class="subtitle" x="60" y="92">Fluxo centrado em catálogo público de microdados via Power BI, com ingestão em raw e tratamento manual posterior no PostgreSQL.</text>

  <rect class="box box-app" x="90" y="140" width="260" height="100" />
  <text class="label" x="132" y="180">1. Interface Administrativa</text>
  <text class="small" x="136" y="206">Conexões, pipelines, dashboards e SQL</text>

  <rect class="box box-app" x="90" y="310" width="260" height="100" />
  <text class="label" x="164" y="352">2. Keycloak</text>
  <text class="small" x="132" y="378">Autenticação administrativa via OIDC</text>

  <rect class="box box-core" x="430" y="140" width="260" height="100" />
  <text class="label" x="533" y="180">3. API</text>
  <text class="small" x="474" y="206">Catálogo PNP, instâncias e integrações</text>

  <rect class="box box-core" x="430" y="330" width="260" height="100" />
  <text class="label" x="492" y="372">4. Airflow</text>
  <text class="small" x="458" y="398">Validação e ingestão por DAG</text>

  <rect class="box box-ext" x="790" y="140" width="280" height="110" />
  <text class="label" x="835" y="184">5. Power BI público da PNP</text>
  <text class="small" x="833" y="210">Catálogo de anos, tipos e links</text>

  <rect class="box box-data" x="790" y="340" width="280" height="110" />
  <text class="label" x="858" y="384">6. PostgreSQL</text>
  <text class="small" x="806" y="410">raw no Airflow, staging e curated manuais</text>

  <rect class="box box-data" x="1120" y="250" width="220" height="100" />
  <text class="label" x="1179" y="292">7. Metabase</text>
  <text class="small" x="1156" y="318">Dashboards e embeds</text>

  <rect class="box box-data" x="1120" y="410" width="220" height="100" />
  <text class="label" x="1204" y="452">8. Vanna</text>
  <text class="small" x="1168" y="478">Consulta segura em curated</text>

  <path class="arrow" d="M350 190 L430 190" />
  <text class="note" x="370" y="178">operação admin</text>

  <path class="arrow" d="M220 240 L220 310" />
  <text class="note" x="232" y="286">login</text>

  <path class="arrow" d="M350 360 L430 210" />
  <text class="note" x="348" y="286">token OIDC</text>

  <path class="arrow" d="M690 190 L790 190" />
  <text class="note" x="714" y="178">consulta metadados</text>

  <path class="arrow" d="M690 380 L790 190" />
  <text class="note" x="712" y="300">disparo de coleta</text>

  <path class="arrow-data" d="M790 220 L690 380" />
  <text class="note-data" x="714" y="246">catálogo e URLs públicas</text>

  <path class="arrow-data" d="M690 380 L790 395" />
  <text class="note-data" x="716" y="368">registros e manifestos</text>

  <path class="arrow" d="M690 190 L790 395" />
  <text class="note" x="706" y="312">configuração e estado</text>

  <path class="arrow" d="M1070 395 L1120 300" />
  <text class="note" x="1078" y="336">views curadas manuais</text>

  <path class="arrow" d="M1070 395 L1120 460" />
  <text class="note" x="1078" y="432">consulta segura</text>

  <rect class="box" x="90" y="650" width="1250" height="100" />
  <text class="legend-title" x="120" y="684">Leitura do diagrama</text>
  <text class="legend-text" x="120" y="708">A interface administrativa autentica no Keycloak e opera a API. A API centraliza catálogo, instâncias e integração com o Airflow.</text>
  <text class="legend-text" x="120" y="730">O Airflow consulta o catálogo público do Power BI, baixa os microdados públicos e persiste manifestos e linhas parseadas em raw. O tratamento em staging e a publicação em curated ocorrem manualmente via SGBD.</text>
</svg>
